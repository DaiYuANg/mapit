name: Quarkus Build with Frontend

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: 检出代码
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: 设置 JDK 21 环境
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # Step 3: 设置 gradlew 文件为可执行
      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # Step 4: 缓存 Gradle 缓存目录
      - name: Cache Gradle files
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Configure Gradle JVM arguments
        run: echo "org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=1024m" >> gradle.properties

      # Step 5: 设置 Node.js 版本（21）
      - name: Set up Node.js 21
        uses: actions/setup-node@v4
        with:
          node-version: '21'  # 使用 Node.js 21

      # Step 6: 安装 pnpm 包管理器
      - name: Install pnpm
        run: npm install -g pnpm  # 安装 pnpm

      # Step 7: 缓存 Node.js 依赖
      - name: Cache Node modules
        uses: actions/cache@v4
        with:
          path: src/main/webui/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('src/main/webui/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-node-

      # Step 8: 安装前端依赖并构建前端
      - name: Install and build frontend
        working-directory: src/main/webui  # 进入前端目录
        run: |
          pnpm install  # 安装前端依赖
          pnpm run build  # 构建前端

      # Step 9: 执行 Quarkus 后端构建
      - name: Build Quarkus project
        run: ./gradlew build -stacktrace -x test

      - name: Upload quarkus-app folder
        uses: actions/upload-artifact@v4
        with:
          name: quarkus-app
          path: build/quarkus-app

      # Step 11: 可选的测试步骤
      # - name: Run Tests
      #   run: ./gradlew test